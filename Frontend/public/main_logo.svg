<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 115" width="500" height="115">
  <!--
    MAIN LOGO (LIGHT BG) - 500x115
    InsurTech-Egypt: all #003B73
    ITE: all white (on shield)
    Better=#003B73  Cheaper=#E63946  Faster=#00A859  — bold
    Insurance Technology Partner: bold, #003B73
  -->
  <defs>
    <linearGradient id="sg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0059b3"/>
      <stop offset="100%" stop-color="#002d5a"/>
    </linearGradient>
    <linearGradient id="sh" x1="0%" y1="0%" x2="10%" y2="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#001a3d" flood-opacity="0.3"/>
    </filter>
    <style>.lf{font-family:'Inter','Roboto',Arial,sans-serif;}</style>
  </defs>

  <!-- Shield body: centred at x=44, y=8..103 -->
  <path d="M44 8 L80 20 L80 62 Q80 86 44 103 Q8 86 8 62 L8 20 Z"
        fill="url(#sg)" filter="url(#ds)"/>
  <path d="M44 8 L80 20 L80 62 Q80 86 44 103 Q8 86 8 62 L8 20 Z"
        fill="url(#sh)"/>
  <!-- Inner inset border -->
  <path d="M44 13 L75 23 L75 62 Q75 82 44 97 Q13 82 13 62 L13 23 Z"
        fill="none" stroke="white" stroke-width="0.7" opacity="0.18"/>
  <!-- Green accent bar -->
  <rect x="8" y="20" width="72" height="3" fill="#00A859" rx="0.5"/>

  <!-- ITE: all white -->
  <text x="44" y="72" class="lf" font-size="22" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="4">ITE</text>
  <line x1="24" y1="79" x2="64" y2="79" stroke="white" stroke-width="0.7" opacity="0.22"/>

  <!-- Company Name: InsurTech-Egypt all #003B73 -->
  <text x="98" y="46" class="lf" font-size="34" font-weight="700" fill="#003B73"
        >InsurTech-Egypt</text>

  <!-- Values: BETTER=Blue  CHEAPER=Red  FASTER=Green — bold, same font, centred under name -->
  <text x="240" y="76" class="lf" font-size="14" font-weight="700" letter-spacing="2" text-anchor="middle">
    <tspan fill="#00A859" font-weight="800">BETTER</tspan>
    <tspan fill="#666666" font-weight="700">  ·  </tspan>
    <tspan fill="#F4A261" font-weight="800">CHEAPER</tspan>
    <tspan fill="#666666" font-weight="700">  ·  </tspan>
    <tspan fill="#E63946" font-weight="800">FASTER</tspan>
  </text>
</svg>
