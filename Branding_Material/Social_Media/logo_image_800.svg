<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!--
    SQUARE LOGO IMAGE — 800 × 800
    Ideal for: LinkedIn profile picture, email signature, partnerships, app store.
    Dark navy background, shield centred, name + values below.
    Brand Primary: #003B73  Green: #00A859  Red: #E63946
  -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%"   stop-color="#004d99"/>
      <stop offset="100%" stop-color="#001a3a"/>
    </linearGradient>

    <!-- Shield gradient -->
    <linearGradient id="sg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0068cc"/>
      <stop offset="100%" stop-color="#002d5a"/>
    </linearGradient>
    <linearGradient id="sh" x1="0%" y1="0%" x2="10%" y2="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow behind shield -->
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%"   stop-color="#0066cc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0"/>
    </radialGradient>

    <!-- Corner accent glow (bottom-right green) -->
    <radialGradient id="glow2" cx="90%" cy="90%" r="40%">
      <stop offset="0%"   stop-color="#00A859" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00A859" stop-opacity="0"/>
    </radialGradient>

    <!-- Rounded corner clip -->
    <clipPath id="rc">
      <rect width="800" height="800" rx="40" ry="40"/>
    </clipPath>

    <style>
      .lf { font-family: 'Inter', 'Roboto', Arial, sans-serif; }
    </style>
  </defs>

  <!-- ░░░ BACKGROUND ░░░ -->
  <rect width="800" height="800" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Dot grid texture -->
  <g clip-path="url(#rc)" opacity="0.05" fill="white">
    <circle cx="80"  cy="80"  r="3"/><circle cx="200" cy="80"  r="3"/>
    <circle cx="320" cy="80"  r="3"/><circle cx="440" cy="80"  r="3"/>
    <circle cx="560" cy="80"  r="3"/><circle cx="680" cy="80"  r="3"/>
    <circle cx="80"  cy="200" r="3"/><circle cx="200" cy="200" r="3"/>
    <circle cx="320" cy="200" r="3"/><circle cx="440" cy="200" r="3"/>
    <circle cx="560" cy="200" r="3"/><circle cx="680" cy="200" r="3"/>
    <circle cx="80"  cy="320" r="3"/><circle cx="200" cy="320" r="3"/>
    <circle cx="320" cy="320" r="3"/><circle cx="440" cy="320" r="3"/>
    <circle cx="560" cy="320" r="3"/><circle cx="680" cy="320" r="3"/>
    <circle cx="80"  cy="560" r="3"/><circle cx="200" cy="560" r="3"/>
    <circle cx="320" cy="560" r="3"/><circle cx="440" cy="560" r="3"/>
    <circle cx="560" cy="560" r="3"/><circle cx="680" cy="560" r="3"/>
    <circle cx="80"  cy="680" r="3"/><circle cx="200" cy="680" r="3"/>
    <circle cx="320" cy="680" r="3"/><circle cx="440" cy="680" r="3"/>
    <circle cx="560" cy="680" r="3"/><circle cx="680" cy="680" r="3"/>
  </g>

  <!-- Top green accent bar -->
  <rect x="0" y="0" width="800" height="6" rx="0" fill="#00A859" clip-path="url(#rc)"/>
  <!-- Bottom green accent bar -->
  <rect x="0" y="794" width="800" height="6" fill="#00A859" clip-path="url(#rc)"/>

  <!-- Glow behind shield -->
  <ellipse cx="400" cy="320" rx="300" ry="280" fill="url(#glow)" clip-path="url(#rc)"/>
  <!-- Bottom-right green glow -->
  <rect width="800" height="800" fill="url(#glow2)" clip-path="url(#rc)"/>

  <!-- ░░░ SHIELD — centred, large ░░░ -->
  <!-- Scale from 100x100 viewBox to ~320px, centred at (400, 300) -->
  <g transform="translate(170, 50) scale(2.3)">
    <!-- Drop shadow -->
    <filter id="ds">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#001a3d" flood-opacity="0.5"/>
    </filter>
    <path d="M100 14 L158 34 L158 90 Q158 130 100 150 Q42 130 42 90 L42 34 Z"
          fill="url(#sg)" filter="url(#ds)"/>
    <path d="M100 14 L158 34 L158 90 Q158 130 100 150 Q42 130 42 90 L42 34 Z"
          fill="url(#sh)"/>
    <path d="M100 20 L152 38 L152 90 Q152 126 100 144 Q48 126 48 90 L48 38 Z"
          fill="none" stroke="white" stroke-width="1.2" opacity="0.2"/>
    <!-- Green accent bar -->
    <rect x="42" y="34" width="116" height="5.5" fill="#00A859" rx="1"/>
    <!-- ITE text -->
    <text x="100" y="108" class="lf" font-size="46" font-weight="800"
          fill="white" text-anchor="middle" letter-spacing="8">ITE</text>
    <!-- Underline -->
    <line x1="60" y1="118" x2="140" y2="118" stroke="white" stroke-width="1.4" opacity="0.25"/>
  </g>

  <!-- ░░░ COMPANY NAME ░░░ -->
  <text x="400" y="590" class="lf" font-size="52" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="-0.5">InsurTech-Egypt</text>

  <!-- Thin rule -->
  <line x1="120" y1="610" x2="680" y2="610" stroke="white" stroke-width="0.8" opacity="0.15"/>

  <!-- ░░░ VALUES ░░░ -->
  <text x="400" y="660" class="lf" font-size="24" font-weight="800"
        text-anchor="middle" letter-spacing="3">
    <tspan fill="#7BB8FF">BETTER</tspan>
    <tspan fill="rgba(255,255,255,0.6)" font-weight="400">  ·  </tspan>
    <tspan fill="#E63946">CHEAPER</tspan>
    <tspan fill="rgba(255,255,255,0.6)" font-weight="400">  ·  </tspan>
    <tspan fill="#2EE87A">FASTER</tspan>
  </text>

  <!-- Thin rule under values -->
  <line x1="200" y1="680" x2="600" y2="680" stroke="white" stroke-width="0.7" opacity="0.12"/>

  <!-- ░░░ TAGLINE ░░░ -->
  <text x="400" y="728" class="lf" font-size="16" font-weight="400"
        fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">INSURANCE TECHNOLOGY PARTNER</text>

</svg>
