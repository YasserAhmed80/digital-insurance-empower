<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    ITE MONOGRAM / BADGE - 200x200
    LinkedIn/social profile picture, app store icon.
    ITE: all white
    Name: InsurTech-Egypt all white (dark bg tile)
    Values: Better=#7BB8FF  Cheaper=#E63946  Faster=#2EE87A — bold
    Insurance Technology Partner: bold, white
  -->
  <defs>
    <linearGradient id="bg" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#004d99"/>
      <stop offset="100%" stop-color="#002040"/>
    </linearGradient>
    <linearGradient id="sg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0068cc"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="sh" x1="0%" y1="0%" x2="10%" y2="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rc">
      <rect width="200" height="200" rx="20" ry="20"/>
    </clipPath>
    <style>.lf{font-family:'Inter','Roboto',Arial,sans-serif;}</style>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="20" ry="20" fill="url(#bg)"/>

  <!-- Subtle dot grid texture -->
  <g opacity="0.05" clip-path="url(#rc)">
    <circle cx="20"  cy="20"  r="1.5" fill="white"/><circle cx="60"  cy="20"  r="1.5" fill="white"/>
    <circle cx="100" cy="20"  r="1.5" fill="white"/><circle cx="140" cy="20"  r="1.5" fill="white"/>
    <circle cx="180" cy="20"  r="1.5" fill="white"/><circle cx="20"  cy="60"  r="1.5" fill="white"/>
    <circle cx="60"  cy="60"  r="1.5" fill="white"/><circle cx="100" cy="60"  r="1.5" fill="white"/>
    <circle cx="140" cy="60"  r="1.5" fill="white"/><circle cx="180" cy="60"  r="1.5" fill="white"/>
    <circle cx="20"  cy="100" r="1.5" fill="white"/><circle cx="60"  cy="100" r="1.5" fill="white"/>
    <circle cx="100" cy="100" r="1.5" fill="white"/><circle cx="140" cy="100" r="1.5" fill="white"/>
    <circle cx="180" cy="100" r="1.5" fill="white"/><circle cx="20"  cy="140" r="1.5" fill="white"/>
    <circle cx="60"  cy="140" r="1.5" fill="white"/><circle cx="100" cy="140" r="1.5" fill="white"/>
    <circle cx="140" cy="140" r="1.5" fill="white"/><circle cx="180" cy="140" r="1.5" fill="white"/>
  </g>

  <!-- Shield: centred, peak y=14 -->
  <path d="M100 14 L158 34 L158 90 Q158 130 100 150 Q42 130 42 90 L42 34 Z"
        fill="url(#sg)" clip-path="url(#rc)"/>
  <path d="M100 14 L158 34 L158 90 Q158 130 100 150 Q42 130 42 90 L42 34 Z"
        fill="url(#sh)" clip-path="url(#rc)"/>
  <path d="M100 20 L152 38 L152 90 Q152 126 100 144 Q48 126 48 90 L48 38 Z"
        fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
  <rect x="42" y="34" width="116" height="4.5" fill="#00A859" rx="1"/>

  <!-- ITE: all white -->
  <text x="100" y="108" class="lf" font-size="42" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="7">ITE</text>
  <line x1="62" y1="118" x2="138" y2="118" stroke="white" stroke-width="1.2" opacity="0.25"/>

  <!-- Divider -->
  <line x1="20" y1="162" x2="180" y2="162" stroke="white" stroke-width="0.7" opacity="0.15"/>

  <!-- Name: InsurTech-Egypt all white -->
  <text x="100" y="175" class="lf" font-size="14" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="0.3">InsurTech-Egypt</text>

  <!-- Values: BETTER=Green  CHEAPER=Yellow  FASTER=Red — bold, directly under name -->
  <text x="100" y="192" class="lf" font-size="10.5" font-weight="700" text-anchor="middle" letter-spacing="1.5">
    <tspan fill="#2EE87A" font-weight="800">BETTER</tspan>
    <tspan fill="rgba(255,255,255,0.75)" font-weight="700"> · </tspan>
    <tspan fill="#F4A261" font-weight="800">CHEAPER</tspan>
    <tspan fill="rgba(255,255,255,0.75)" font-weight="700"> · </tspan>
    <tspan fill="#E63946" font-weight="800">FASTER</tspan>
  </text>
</svg>
